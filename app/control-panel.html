<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clod Pet - Control Panel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
      font-size: 11px;
      background: #008080;
      color: #000;
      padding: 0;
      min-width: 350px;
    }

    h1 {
      font-size: 12px;
      font-weight: bold;
      margin: 0;
      padding: 2px 4px;
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
      display: flex;
      align-items: center;
      gap: 4px;
      border: 1px solid;
      border-color: #c0c0c0 #404040 #404040 #c0c0c0;
      -webkit-app-region: drag;
    }
    h1 button {
      -webkit-app-region: no-drag;
      background: #c0c0c0;
      border: 2px solid;
      border-color: #c0c0c0 #404040 #404040 #c0c0c0;
      font-size: 10px;
      padding: 0px 4px;
      cursor: pointer;
      margin-left: auto;
    }
    h1 button:active {
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      padding: 1px 3px 0px 5px;
    }

    .window {
      background: #c0c0c0;
      border: 2px solid;
      border-color: #c0c0c0 #404040 #404040 #c0c0c0;
      margin: 4px;
    }

    fieldset.card {
      border: 2px solid;
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      padding: 8px;
      margin: 8px;
      background: #c0c0c0;
    }

    legend {
      font-weight: bold;
      font-size: 11px;
      padding: 0 4px;
    }

    .btn {
      background: #c0c0c0;
      color: #000;
      border: 2px solid;
      border-color: #c0c0c0 #404040 #404040 #c0c0c0;
      padding: 2px 10px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
    }
    .btn:active {
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      padding: 3px 9px 1px 11px;
    }
    .btn-small { padding: 1px 6px; font-size: 11px; }

    label {
      display: block;
      margin-bottom: 4px;
      font-size: 11px;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 4px;
    }

    .range-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
    }

    select, input[type="number"] {
      width: 100%;
      background: #fff;
      color: #000;
      border: 2px solid;
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      padding: 1px 3px;
      font-size: 11px;
      font-family: 'MS Sans Serif', 'Tahoma', sans-serif;
      margin-bottom: 8px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      padding: 2px 0;
      font-size: 11px;
    }

    input[type="checkbox"] {
      width: 13px;
      height: 13px;
      margin: 0;
    }

    .pet-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px;
      border: 2px solid;
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      margin-bottom: 4px;
      background: #c0c0c0;
    }

    #active-pets {
      max-height: 300px;
      overflow-y: auto;
    }

    .pet-info {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .pet-title {
      font-size: 11px;
      font-weight: bold;
    }

    .pet-id {
      font-size: 11px;
      color: #808080;
    }

    .empty-state {
      text-align: center;
      padding: 12px;
      font-size: 11px;
      color: #808080;
    }

    .add-pet-row {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .add-pet-row select { flex: 1; margin-bottom: 0; }

    .status {
      font-size: 11px;
      text-align: center;
      margin: 4px;
      padding: 2px;
      border: 2px solid;
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
      background: #c0c0c0;
    }

    .diagnostics-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 2px 8px;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .diag-label {
      color: #808080;
    }

    .diag-value {
      overflow-wrap: anywhere;
    }

    .diag-log {
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      background: #fff;
      padding: 4px;
      border: 2px solid;
      border-color: #404040 #c0c0c0 #c0c0c0 #404040;
    }
  </style>
</head>
<body>
  <div class="window">
    <h1>
      Clod Pet - Control Panel
      <button id="close-btn" title="Close">X</button>
    </h1>

    <!-- Settings -->
    <fieldset class="card">
      <legend>Settings</legend>
      <label for="volume">Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.05" value="0.3">
      <div class="range-label">
        <span>0%</span>
        <span id="volume-value">30%</span>
        <span>100%</span>
      </div>

      <div style="margin-top: 8px;">
        <label class="checkbox-label">
          <input type="checkbox" id="show-advanced"> Show advanced settings
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="show-diagnostics"> Show diagnostics
        </label>
      </div>

      <div id="advanced-settings" style="display: none; margin-top: 8px; border-top: 2px solid #808080; padding-top: 8px;">
        <label for="scale">Scale</label>
        <input type="range" id="scale" min="0.5" max="3" step="0.1" value="1">
        <div class="range-label">
          <span>0.5x</span>
          <span id="scale-value">1.0x</span>
          <span>3.0x</span>
        </div>

        <div style="margin-top: 8px;">
          <label for="gravity">Gravity multiplier</label>
          <input type="range" id="gravity" min="0" max="5" step="0.5" value="2">
          <div class="range-label">
            <span>0x</span>
            <span id="gravity-value">2.0x</span>
            <span>5x</span>
          </div>
        </div>

        <div style="margin-top: 8px;">
          <label for="autostart">Autostart pets</label>
          <input type="number" id="autostart" min="0" max="10" value="1">
        </div>

        <div style="margin-top: 8px;">
          <label class="checkbox-label">
            <input type="checkbox" id="multi-screen"> Multi-screen support
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="win-foreground"> Keep on top
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="steal-focus"> Steal focus (drag)
          </label>
        </div>
      </div>
    </fieldset>

    <!-- Add Pet -->
    <fieldset class="card">
      <legend>Add New Pet</legend>
      <div class="add-pet-row">
        <select id="pet-select">
          <option value="">Loading pets...</option>
        </select>
        <button class="btn" id="add-pet-btn">Add</button>
      </div>
    </fieldset>

    <!-- Active Pets -->
    <fieldset class="card">
      <legend>Active Pets (<span id="pet-count">0</span>)</legend>
      <div id="active-pets">
        <div class="empty-state">No pets active</div>
      </div>
    </fieldset>

    <!-- Diagnostics -->
    <fieldset class="card" id="diagnostics-card" style="display: none;">
      <legend>Diagnostics</legend>
      <button class="btn btn-small" id="refresh-diagnostics-btn" style="float: right;">Refresh</button>
      <div class="diagnostics-grid" id="diagnostics-summary">
        <span class="diag-label">Status</span>
        <span class="diag-value">Loading...</span>
      </div>
      <div class="diag-log" id="diagnostics-log">No diagnostics yet.</div>
      <fieldset id="pet-tracker-card" style="display: none; margin-top: 8px;">
        <legend>Pet Tracker</legend>
        <div id="pet-tracker-content" style="font-size: 11px; font-family: monospace;"></div>
      </fieldset>
    </fieldset>

    <div class="status" id="status">Loading...</div>
  </div>

  <script src="control-panel.js"></script>
</body>
</html>
