<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self'">
  <title>Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { background: transparent; overflow: hidden; width: 100%; height: 100%; }
    canvas { display: block; pointer-events: none; }
    #backend-status {
      position: fixed;
      left: 8px;
      top: 8px;
      max-width: calc(100% - 16px);
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(233, 69, 96, 0.9);
      color: #fff;
      font: 12px/1.3 system-ui, -apple-system, Segoe UI, sans-serif;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
      display: none;
      pointer-events: none;
      z-index: 10;
    }
    #click-layer {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      cursor: grab;
    }
    #click-layer.dragging { cursor: grabbing; }
    #debug-borders {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      display: none;
    }
    .debug-border {
      position: absolute;
      background: rgba(0, 255, 0, 0.4); /* Green hitbox */
      transition: background 0.1s;
    }
    .debug-border.colliding {
      background: rgba(255, 0, 0, 0.9); /* Red on collision */
      z-index: 1000; /* Highest priority */
    }
    .debug-screen-edge {
      position: absolute;
      background: rgba(255, 0, 255, 0.8); /* Magenta */
      z-index: 900;
    }
    .debug-pet-hitbox {
      position: absolute;
      border: 2px solid rgba(0, 0, 255, 0.8); /* Blue */
      z-index: 800;
    }
    .debug-world {
      position: absolute;
      background: rgba(0, 0, 255, 0.2); 
      border: 1px solid rgba(0, 0, 255, 0.4);
      z-index: 100;
    }
    .debug-taskbar {
      position: absolute;
      background: rgba(0, 255, 0, 0.3); /* Green taskbar hitbox */
      border: 1px solid rgba(0, 255, 0, 0.6);
      z-index: 200;
    }
    .debug-taskbar.colliding {
      background: rgba(255, 0, 0, 0.5);
      border-color: rgba(255, 0, 0, 0.8);
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="backend-status"></div>
  <canvas id="sprite"></canvas>
  <div id="click-layer"></div>
  <div id="debug-borders"></div>
  <script src="src/pet-renderer.js"></script>
</body>
</html>
