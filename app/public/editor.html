<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; script-src 'self'; connect-src 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clod Pet - Animation Editor</title>
  <link rel="stylesheet" href="editor.css">
  <link rel="stylesheet" href="control-panel-windows.css">
  <link rel="stylesheet" href="control-panel-mac.css">
</head>
<body>
  <div class="window editor-window">
    <h1 class="titlebar">
      <span class="titlebar-icon" aria-hidden="true"></span>
      <span class="titlebar-title" id="window-title">Clod Pet - Animation Editor</span>
      <div class="titlebar-controls">
        <button class="titlebar-close" id="close-btn" title="Close" aria-label="Close"></button>
        <button class="titlebar-minimize" id="minimize-btn" title="Minimize" aria-label="Minimize"></button>
        <button class="titlebar-zoom" id="zoom-btn" title="Zoom" aria-label="Zoom"></button>
      </div>
    </h1>

    <div class="editor-toolbar">
      <div class="toolbar-group">
        <button class="btn btn-small" id="open-file-btn">Open File</button>
        <button class="btn btn-small" id="open-dir-btn">Open Dir</button>
        <button class="btn btn-small" id="reveal-btn">Show In Folder</button>
      </div>
      <div class="toolbar-group">
        <button class="btn btn-small" id="save-btn">Save</button>
        <button class="btn btn-small" id="save-as-btn">Save As</button>
        <button class="btn btn-small" id="revert-btn">Revert</button>
      </div>
      <div class="toolbar-group">
        <button class="btn btn-small" id="undo-btn">Undo</button>
        <button class="btn btn-small" id="redo-btn">Redo</button>
        <button class="btn btn-small" id="layout-btn">Layout</button>
        <button class="btn btn-small" id="fit-btn">Fit</button>
        <button class="btn btn-small" id="center-btn">Center</button>
      </div>
      <div class="toolbar-group toolbar-search">
        <input id="search-input" type="search" placeholder="Search animations, spawns, children">
      </div>
      <div class="toolbar-group toolbar-theme">
        <select id="theme-select"></select>
      </div>
      <div class="toolbar-group toolbar-status" id="validation-summary"></div>
    </div>

    <div class="editor-workspace">
      <aside class="editor-sidebar">
        <section class="groupbox">
          <div class="groupbox-title">Recent Documents</div>
          <div class="sidebar-list" id="recent-docs"></div>
        </section>

        <section class="groupbox">
          <div class="groupbox-title">Animations</div>
          <div class="sidebar-list" id="animation-list"></div>
        </section>

        <section class="groupbox">
          <div class="groupbox-title">Spawns</div>
          <div class="sidebar-list" id="spawn-list"></div>
        </section>

        <section class="groupbox">
          <div class="groupbox-title">Children</div>
          <div class="sidebar-list" id="child-list"></div>
        </section>
      </aside>

      <main class="editor-canvas-shell">
        <div class="graph-toolbar">
          <div class="graph-title" id="graph-title">No document loaded</div>
          <div class="graph-hint" id="graph-hint"></div>
        </div>
        <div class="graph-stage" id="graph-stage">
          <div class="graph-viewport" id="graph-viewport">
            <svg class="graph-edges" id="graph-edges"></svg>
            <div class="graph-nodes" id="graph-nodes"></div>
            <div class="graph-labels" id="graph-labels"></div>
          </div>
        </div>
        <div class="minimap" id="minimap"></div>
      </main>

      <aside class="editor-inspector">
        <section class="groupbox">
          <div class="groupbox-title">Document</div>
          <div id="document-inspector"></div>
        </section>

        <section class="groupbox">
          <div class="groupbox-title">Selection</div>
          <div id="selection-inspector"></div>
        </section>

        <section class="groupbox">
          <div class="groupbox-title">Validation</div>
          <div id="validation-list" class="validation-list"></div>
        </section>
      </aside>
    </div>

    <div class="editor-statusbar" id="statusbar">Loading editor...</div>
  </div>

  <script src="src/renderer/ui/themes.js"></script>
  <script type="module" src="editor/main.js"></script>
</body>
</html>
