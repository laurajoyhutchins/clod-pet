<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clod Pet - Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 24px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .section { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-size: 13px; }
    input[type="range"] { width: 100%; }
    input[type="number"] {
      width: 60px; background: #16213e; color: #eee;
      border: 1px solid #0f3460; padding: 4px 8px; border-radius: 4px;
    }
    .status { font-size: 11px; opacity: 0.6; margin-top: 12px; }
  </style>
</head>
<body>
  <h1>Clod Pet</h1>
  <div class="section">
    <label>Volume</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.3">
  </div>
  <div class="section">
    <label>Scale</label>
    <input type="number" id="scale" min="0.5" max="3" step="0.1" value="1">
  </div>
  <div class="status" id="status">connecting...</div>
</body>
</html>
