<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pet Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message {
      max-width: 85%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.user {
      align-self: flex-end;
      background: #e94560;
      color: white;
      border-bottom-right-radius: 2px;
    }

    .message.assistant {
      align-self: flex-start;
      background: #16213e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-left-radius: 2px;
    }

    #input-container {
      padding: 15px;
      background: #16213e;
      display: flex;
      gap: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    #chat-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #eee;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    #chat-input:focus {
      border-color: #e94560;
    }

    #send-btn {
      background: #e94560;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #c73e54; }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .typing {
      font-style: italic;
      opacity: 0.7;
      font-size: 12px;
      margin-bottom: 4px;
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div class="message assistant">Hello! I'm your clod-pet. How can I help you today?</div>
  </div>
  <div id="input-container">
    <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off">
    <button id="send-btn">Send</button>
  </div>

  <script src="chat.js"></script>
</body>
</html>
